version: 2.1

orbs:
  gradle: circleci/gradle@3.0.0
  gcp-gcr: circleci/gcp-gcr@0.16.2
  slack: circleci/slack@4.12.5

jobs:
  build-and-push-image:
    docker:
      - image: cimg/openjdk:25.0
    steps:
      - checkout
      - run:
          name: Build and push image
          command: ./gradlew jib -Djib.httpTimeout=60000
      - slack/notify:
          event: fail
          template: basic_fail_1
          mentions: <@U04NVUWQE93>
      - slack/notify:
          event: pass
          template: success_tagged_deploy_1
          mentions: <@U04NVUWQE93>

workflows:
  test-build-publish:
    jobs:
      - gradle/test:
          name: test
          deps_checksum_file: build.gradle.kts
          executor:
            name: gradle/default
            tag: '20.0.1'
      - build-and-push-image:
          requires: [test]
          filters:
            branches:
              only:
                - main
