version: 2.1

orbs:
  gradle: circleci/gradle@4.1.0

workflows:
  test-build-publish:
    jobs:
      - gradle/test:
          name: test
          deps_checksum_file: build.gradle.kts
          executor:
            name: gradle/default
            tag: '17.0'
      - gradle/run:
          name: build-and-push-image
          command: jib
          executor:
            name: gradle/default
            tag: '17.0'
          requires: [test]
          filters:
            branches:
              only:
                - main
