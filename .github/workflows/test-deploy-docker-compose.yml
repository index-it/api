name: Deploy test docker compose to VPS

# Controls when the workflow will run
on:
  workflow_run:
    workflows: [ "Build and push test Docker image" ]
    types:
      - completed
    branches: [ test ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Copy docker-compose to vps
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP_ADDRESS }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "./docker-compose-test.yml"
          target: "/root/index/test-api"

      - name: Run docker compose up
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP_ADDRESS }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /root/index/test-api
            docker compose -f docker-compose-test.yml down --rmi all --remove-orphans
            docker compose -f docker-compose-test.yml up -d