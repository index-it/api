version: "3.8"
services:
  index:
    image: ghcr.io/index-it/api:main
    container_name: "index-api"
    depends_on:
      - index-redis
    env_file:
      - .env
    ports:
      - "${PORT}:8080"
    networks:
      - index-network
  index-redis:
    image: redis:latest
    container_name: "index-redis"
    restart: always
    command: redis-server
    networks:
      - index-network

networks:
  index-network:
    name: index-network
