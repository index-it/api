version: "3.8"
services:
  index-mongo:
    image: mongo:latest
    container_name: "index-mongo"
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data
    networks:
      - mongo-network
    environment:
      - MONGO_INITDB_DATABASE=IndexDev
  index-mongo-express:
    image: mongo-express:latest
    container_name: "index-mongo-express"
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - mongo-network
    environment:
      - ME_CONFIG_MONGODB_SERVER=index-mongo
  index-redis:
    image: redis:latest
    container_name: "index-redis"
    restart: unless-stopped
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
    networks:
      - redis-network
  index-redis-insight:
    image: redislabs/redisinsight
    container_name: "index-redis-insight"
    restart: unless-stopped
    ports:
      - "8082:8001"
    networks:
      - redis-network
  index-rabbit:
    image: rabbitmq:3.9-management
    container_name: "index-rabbit"
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "8083:15672"
volumes:
  redis:
  mongo:
  rabbit:

networks:
  mongo-network:
    name: mongo-network
  redis-network:
    name: redis-network