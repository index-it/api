version: "3.8"
services:
  index-test:
    image: eu.gcr.io/index-352608/index-api-test:latest
    container_name: "index-api-test"
    depends_on:
      - index-redis-test
    env_file:
      - .env
    ports:
      - "8080:${PORT}"
    networks:
      - index-network-test
  index-redis-test:
    image: redis:latest
    container_name: "index-redis-test"
    restart: always
    command: redis-server
    volumes:
      - redis:/data
    networks:
      - index-network-test

volumes:
  redis:

networks:
  index-network-test:
    name: index-network-test
