version: "3.8"
name: "index-backend-staging-env"

services:
  postgres:
    image: postgres
    container_name: ${COMPOSE_PROJECT_NAME}_postgres
    restart: no
    environment:
      POSTGRES_DB: indexstagingdb
      POSTGRES_USER: IndexStagingUser
      POSTGRES_PASSWORD: IndexStagingPassword
    volumes:
      - index-staging-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - index-staging-postgres-network
  adminer:
    image: adminer
    container_name: ${COMPOSE_PROJECT_NAME}_adminer
    restart: no
    ports:
      - "8081:8080"
    networks:
      - index-staging-postgres-network
  redis:
    image: redis:latest
    container_name: ${COMPOSE_PROJECT_NAME}_redis
    restart: no
    volumes:
      - index-staging-redis:/data
    ports:
      - "6379:6379"
    networks:
      - index-staging-redis-network
  redis-insight:
    image: redislabs/redisinsight
    container_name: ${COMPOSE_PROJECT_NAME}_redis-insight
    restart: no
    ports:
      - "8082:8001"
    networks:
      - index-staging-redis-network
  rabbit:
    image: rabbitmq:3.9-management
    container_name: ${COMPOSE_PROJECT_NAME}_rabbit
    restart: no
    ports:
      - "5672:5672"
      - "8083:15672"
  prometheus:
    image: prom/prometheus
    container_name: ${COMPOSE_PROJECT_NAME}_prometheus
    restart: no
    ports:
      - "9090:9090"
    volumes:
      - "../config/prometheus/prometheus-monitoring.yml:/etc/prometheus/prometheus.yml"
    networks:
      - index-staging-monitor-network
  grafana:
    image: grafana/grafana
    container_name: ${COMPOSE_PROJECT_NAME}_grafana
    restart: no
    ports:
      - "3000:3000"
    volumes:
      - index-staging-grafana-storage:/var/lib/grafana
    networks:
      - index-staging-monitor-network

volumes:
  index-staging-redis: {}
  index-staging-pgdata: {}
  index-staging-rabbit: {}
  index-staging-grafana-storage: {}

networks:
  index-staging-redis-network:
    name: index-staging-redis-network
  index-staging-postgres-network:
    name: index-staging-postgres-network
  index-staging-monitor-network:
    name: index-staging-monitor-network